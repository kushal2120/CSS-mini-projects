<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Business Card</title>
  <link href="styles.css" rel="stylesheet">
</head>

<body>
  <div class="business-card">
    <img class="profile-image" src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="flower">

    <p class="full-name">Kushal kesarwani</p>
    <p class="designation">Software Developer</p>
    <p class="company">@YC startup</p>
    <hr>
    <div class="details">
      <p>Email: your-email@example.com</p>
      <p>Phone: (123) 456-7890</p>
      <p class="portfolio-link"><a
          href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-business-card/design-a-business-card"
          target="_blank">Portfolio</a></p>
      <hr>
    </div>
    <div class="social-media">
      <h2>Connect with me</h2>
      <div class="profile-link">
        <p><a href="">Twitter</a></p>
        <p><a href="">Linkedin</a></p>
        <p><a href="">Github</a></p>
      </div>
    </div>

  </div>

</body>

</html>
